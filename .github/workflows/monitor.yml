name: Monitor Webpages for Changes

on:
  push:
    branches: [ main ]
  schedule:
    # Run every hour (at the top of the hour)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual execution via GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages-deploy'
  cancel-in-progress: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Page Check Script
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
        run: |
          python tracker.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No change configurations or crawls to commit."
          else
            git commit -m "Auto-update website crawls and history archives [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Build Dashboard Dist Bundle
        run: |
          mkdir -p dist
          # Copy static dashboard frontend assets
          cp -r static/* dist/
          # Create .nojekyll file to bypass Jekyll compilation on GitHub Pages
          touch dist/.nojekyll
          # Copy crawled data & history archive to make it accessible to static site
          if [ -d "data" ]; then
            cp -r data dist/
          else
            mkdir -p dist/data
            echo "[]" > dist/data/monitors.json
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
